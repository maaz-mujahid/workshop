<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d6e5f">
<title>Workshop — Parts & Inventory</title>
<style>
:root{color-scheme:light;
 --bg:#f7f6f3;--card:#fff;--ink:#1a1a1a;--muted:#6b6b6b;--line:#e6e2da;
 --accent:#0d6e5f;--accent-soft:#e3f1ee;--warn:#b45309;--warn-soft:#fdf0e0;
 --danger:#b91c1c;--ok:#15803d;--ok-soft:#e5f3e8;--chip:#f0ede6;--blue:#1e5aa8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:14px;max-width:1080px;margin:0 auto;padding-bottom:60px}
h1{font-size:19px;font-weight:700}
.sub{color:var(--muted);font-size:12px;margin-top:2px}
header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.stats{display:flex;gap:8px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 12px;text-align:center;min-width:74px}
.stat b{display:block;font-size:16px}.stat span{font-size:10px;color:var(--muted)}
.syncbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-bottom:12px;font-size:12px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.dot.on{background:var(--ok)}.dot.off{background:#c0392b}
.pill-dirty{background:var(--warn-soft);color:var(--warn);border-radius:10px;padding:2px 9px;font-weight:700;font-size:11px}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab .cnt{background:rgba(0,0,0,.08);border-radius:10px;padding:0 7px;margin-left:4px;font-size:11px}
.tab.active .cnt{background:rgba(255,255,255,.25)}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
input,select,textarea,button{font:inherit}
input,select,textarea{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.btn{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:8px 13px;cursor:pointer;font-weight:600;font-size:13px}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.small{padding:4px 10px;font-size:12px;border-radius:6px}
.btn:disabled{opacity:.45;cursor:default}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.thumb{width:74px;height:74px;border-radius:10px;background:linear-gradient(160deg,#fcfbf9,#efece5);border:1px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;overflow:hidden}
.thumb svg{width:62px;height:62px}.thumb img{width:100%;height:100%;object-fit:cover}
.caticon{display:inline-block;vertical-align:-3px;margin-left:6px;opacity:.7}.caticon svg{width:16px;height:16px}
.body{flex:1;min-width:0}
.name{font-weight:700;font-size:14px}
.pid{color:var(--muted);font-weight:400;font-size:11px;margin-left:4px}
.desc{color:var(--muted);font-size:12px;margin:2px 0 6px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.chip{background:var(--chip);border-radius:6px;padding:2px 8px;font-size:11px;color:#444}
.chip.proj{background:var(--accent-soft);color:var(--accent)}
.chip.buy{background:var(--warn-soft);color:var(--warn);font-weight:700}
.chip.ok{background:var(--ok-soft);color:var(--ok);font-weight:700}
.qtyrow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:12px}
.qtyrow b{font-size:14px}
.src{color:var(--muted);font-size:11px;margin-top:3px}
.src a{color:var(--blue)}
.acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.price{font-weight:700;font-size:15px;white-space:nowrap;text-align:right}
.price small{display:block;font-weight:400;color:var(--muted);font-size:11px}
.section-total{background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;padding:10px 14px;font-weight:700;display:flex;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.ai-inline{display:none;margin-top:8px;background:var(--accent-soft);border:1px solid #c4ddd7;border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.5}
.ai-inline.show{display:block}
.ai-inline b{color:var(--accent)}
.projcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.projcard h3{font-size:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stsel{border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;border:1px solid var(--line)}
.st-Idea{background:#eef2f7;color:#475569}.st-Planned{background:#e3f1ee;color:#0d6e5f}
.st-InProgress{background:#fef3c7;color:#b45309}.st-Completed{background:#e5f3e8;color:#15803d}
.st-Cancelled{background:#f3f4f6;color:#9ca3af}
.bar{height:6px;background:var(--chip);border-radius:3px;margin:10px 0;overflow:hidden}.bar i{display:block;height:100%;background:var(--accent)}
.ptable{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.ptable th,.ptable td{border-bottom:1px solid var(--line);padding:5px 6px;text-align:left}
.ptable th{color:var(--muted);font-weight:600}
.ptable td.n{text-align:right;white-space:nowrap}
.safety{background:var(--warn-soft);border-radius:8px;padding:8px 12px;font-size:12px;margin-top:8px}
.safety li{margin-left:16px}
dialog{border:none;border-radius:14px;padding:0;max-width:460px;width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
dialog::backdrop{background:rgba(0,0,0,.4)}
.dlg{padding:18px}.dlg h3{margin-bottom:10px}
.dlg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:10px 0 3px}
.dlg input,.dlg select,.dlg textarea{width:100%}
.dlg .row2{display:flex;gap:10px}.dlg .row2>div{flex:1}
.dlg .foot{display:flex;justify-content:space-between;margin-top:16px;gap:8px}
.dlg .note{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4}
.empty{text-align:center;color:var(--muted);padding:40px 16px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media (max-width:640px){.card{flex-wrap:wrap}.price{text-align:left;width:100%}}
</style>
</head>

<header>
  <div>
    <h1>🛠 Workshop</h1>
    <div class="sub">Parts &amp; inventory · Home Automation · prices ≈ INR</div>
  </div>
  <div class="stats">
    <div class="stat"><b id="stBuy">–</b><span>to buy</span></div>
    <div class="stat"><b id="stCost">–</b><span>est. cost</span></div>
    <div class="stat"><b id="stOwn">–</b><span>owned</span></div>
    <div class="stat"><b id="stProj">–</b><span>projects</span></div>
  </div>
</header>

<div class="syncbar">
  <span><span class="dot off" id="netDot"></span> <span id="netTxt">checking…</span></span>
  <span id="dirtyWrap" style="display:none"><span class="pill-dirty" id="dirtyTxt">unsaved changes</span></span>
  <span style="flex:1"></span>
  <button class="btn small primary" id="syncBtn">☁ Sync to GitHub</button>
  <button class="btn small" id="cfgBtn">⚙ Setup</button>
  <button class="btn small" id="reloadBtn">↻ Reload data</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="shop">🛒 Shopping<span class="cnt" id="cShop"></span></div>
  <div class="tab" data-tab="inv">📦 Inventory<span class="cnt" id="cInv"></span></div>
  <div class="tab" data-tab="proj">🏗 Projects<span class="cnt" id="cProj"></span></div>
  <div class="tab" data-tab="all">🗂 All Parts<span class="cnt" id="cAll"></span></div>
</div>

<div class="toolbar">
  <input id="filter" placeholder="Filter parts…" style="flex:1;min-width:140px">
  <select id="projFilter"><option value="">All projects</option></select>
  <button class="btn" id="addPart">+ Part</button>
  <button class="btn" id="copyList" title="Copy shopping list as text">📋 Copy</button>
</div>

<div id="view"><div class="empty"><span class="spin"></span> Loading workshop data…</div></div>

<dialog id="dlg"><div class="dlg" id="dlgBody"></div></dialog>
<div class="toast" id="toast"></div>

PICS.esp32p=PICS.esp32; PICS.jbox=PICS.ipbox; PICS.mlcc2=PICS.mlcc;

/* ================= STATE ================= */
const LS='ws-state-v1';
let S={parts:{},projects:[],boms:{},inv:{},cfg:{owner:'',repo:'',branch:'main',token:''},dirty:false,loadedFrom:''};
let tab='shop',filter='',projFilter='';

const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':(''+s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rup=n=>'₹'+(Math.round(n*10)/10).toLocaleString('en-IN');
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

function saveLocal(){localStorage.setItem(LS,JSON.stringify({inv:S.inv,cfg:S.cfg,dirty:S.dirty,cache:{parts:S.parts,projects:S.projects,boms:S.boms}}))}
function markDirty(){S.dirty=true;saveLocal();updateSync()}

/* ================= DATA LOADING ================= */
async function fetchJSON(path){
 const r=await fetch(path+'?t='+Date.now(),{cache:'no-store'});
 if(!r.ok)throw new Error(path+' '+r.status);
 return r.json();
}
async function loadData(force){
 const saved=JSON.parse(localStorage.getItem(LS)||'{}');
 if(saved.cfg)S.cfg=Object.assign(S.cfg,saved.cfg);
 if(saved.inv)S.inv=saved.inv;
 if(saved.dirty)S.dirty=saved.dirty;
 try{
  const [parts,projList]=await Promise.all([fetchJSON('data/parts.json'),fetchJSON('data/projects.json')]);
  S.parts=parts.parts||{};
  const slugs=projList.projects||[];
  const projs=[],boms={};
  for(const slug of slugs){
   try{
    const [pj,bm]=await Promise.all([fetchJSON('projects/'+slug+'/project.json'),fetchJSON('projects/'+slug+'/bom.json')]);
    projs.push(pj);boms[slug]=bm.items||[];
   }catch(e){console.warn('project load fail',slug,e)}
  }
  S.projects=projs;S.boms=boms;S.loadedFrom='github';
  // seed inventory from repo file only if we have no local inventory yet
  if(!saved.inv){try{const iv=await fetchJSON('data/inventory.json');S.inv=iv.stock||{}}catch(e){S.inv={}}}
  // merge in any project-status overrides the user changed locally but hasn't synced
  if(saved.statusOverride){for(const p of S.projects){if(saved.statusOverride[p.id])p.status=saved.statusOverride[p.id]}}
  saveLocal();
  return true;
 }catch(e){
  // offline / file:// — fall back to cache
  if(saved.cache&&saved.cache.parts){
   S.parts=saved.cache.parts;S.projects=saved.cache.projects||[];S.boms=saved.cache.boms||{};
   S.loadedFrom='cache';return true;
  }
  throw e;
 }
}

/* ================= CALC ================= */
function needFor(pid,scope){ // scope: 'active' | slug
 let n=0;
 for(const p of S.projects){
  if(scope==='active'){if(!ACTIVE.includes(p.status))continue}
  else{if(p.id!==scope)continue}
  const item=(S.boms[p.id]||[]).find(b=>b.partId===pid);
  if(item)n+=item.qty;
 }
 return n;
}
const owned=pid=>S.inv[pid]||0;
function toBuy(pid,scope){return Math.max(0,needFor(pid,scope)-owned(pid))}
function partsInScope(scope){
 const set=new Set();
 for(const p of S.projects){
  if(scope==='active'){if(!ACTIVE.includes(p.status))continue}
  else if(scope!=='__all__'){if(p.id!==scope)continue}
  (S.boms[p.id]||[]).forEach(b=>set.add(b.partId));
 }
 return [...set];
}
function projName(id){const p=S.projects.find(x=>x.id===id);return p?p.name:id}

/* ================= RENDER ================= */
function stats(){
 const scope=projFilter||'active';
 const buy=partsInScope(scope).filter(pid=>toBuy(pid,scope)>0);
 $('#stBuy').textContent=buy.length;
 $('#stCost').textContent=rup(buy.reduce((a,pid)=>a+toBuy(pid,scope)*(S.parts[pid]?.expectedPrice||0),0));
 $('#stOwn').textContent=Object.values(S.inv).reduce((a,b)=>a+b,0);
 $('#stProj').textContent=S.projects.length;
 $('#cShop').textContent=buy.length;
 $('#cInv').textContent=Object.keys(S.inv).filter(k=>S.inv[k]>0).length;
 $('#cAll').textContent=Object.keys(S.parts).length;
 $('#cProj').textContent=S.projects.length;
}
function bigPic(part){return PICS[part.icon]||ICONS[part.category]||ICONS.misc}
function catIcon(part){return ICONS[part.category]||ICONS.misc}
function srcHtml(part){
 if(!part.sources||!part.sources.length)return '';
 return part.sources.map(s=>{
  const label=esc(s.shop)+(s.price?' ₹'+esc(s.price):'');
  return s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${label}</a>`:label;
 }).join(' · ');
}
function matchFilter(pid){
 const p=S.parts[pid];if(!p)return false;
 if(!filter)return true;
 const f=filter.toLowerCase();
 return (pid+' '+p.name+' '+(p.spec||'')+' '+CAT[p.category]+' '+(p.alternatives||'')).toLowerCase().includes(f);
}
function partCard(pid,scope){
 const p=S.parts[pid];if(!p)return '';
 const need=needFor(pid,scope==='active'?'active':scope);
 const nb=Math.max(0,need-owned(pid));
 const status=nb>0?`<span class="chip buy">need ${nb} more</span>`:(need>0?`<span class="chip ok">✓ covered</span>`:'');
 const projChips=S.projects.filter(pr=>(S.boms[pr.id]||[]).some(b=>b.partId===pid))
   .map(pr=>{const q=(S.boms[pr.id]||[]).find(b=>b.partId===pid).qty;return `<span class="chip proj">${esc(pr.name)} ×${q}</span>`}).join('');
 const showQty=nb>0?nb:(need||owned(pid));
 return `<div class="card" data-pid="${pid}">
  <div class="thumb">${bigPic(p)}</div>
  <div class="body">
   <div class="name">${esc(p.name)}<span class="pid">${pid}</span><span class="caticon" title="${CAT[p.category]}">${catIcon(p)}</span></div>
   <div class="desc">${esc(p.spec||'')}${p.notes?' — '+esc(p.notes):''}</div>
   <div class="chips"><span class="chip">${CAT[p.category]}</span>${projChips}${status}</div>
   <div class="qtyrow"><span>need <b>${need}</b></span><span>own <b>${owned(pid)}</b></span></div>
   <div class="src">${srcHtml(p)}</div>
   <div class="acts">
    ${nb>0?`<button class="btn small primary" data-act="buy">＋ Bought 1</button><button class="btn small" data-act="buyall">Bought all ${nb}</button>`:''}
    ${owned(pid)>0?`<button class="btn small" data-act="minus">−1</button>`:''}
    <button class="btn small" data-act="alt">🤖 Alternatives</button>
    <button class="btn small" data-act="edit">✎</button>
   </div>
   <div class="ai-inline" data-aibox></div>
  </div>
  <div class="price">${p.expectedPrice?rup(p.expectedPrice):'FREE'}${p.expectedPrice?`<small>×${showQty} = ${rup(p.expectedPrice*showQty)}</small>`:'<small>salvage</small>'}</div>
 </div>`;
}
function render(){
 if(!Object.keys(S.parts).length)return;
 stats();
 const v=$('#view');
 if(tab==='shop'){
  const scope=projFilter||'active';
  let buy=partsInScope(scope).filter(pid=>toBuy(pid,scope)>0&&matchFilter(pid));
  buy.sort((a,b)=>toBuy(b,scope)*(S.parts[b].expectedPrice||0)-toBuy(a,scope)*(S.parts[a].expectedPrice||0));
  const total=buy.reduce((a,pid)=>a+toBuy(pid,scope)*(S.parts[pid].expectedPrice||0),0);
  const scopeLbl=projFilter?projName(projFilter):'all active projects';
  v.innerHTML=(buy.length?`<div class="section-total"><span>🛒 ${buy.length} items · ${esc(scopeLbl)}</span><span>expected ${rup(total)}</span></div>`:'')+
   (buy.map(pid=>partCard(pid,scope)).join('')||'<div class="empty">🎉 Nothing to buy for this scope — all covered.</div>');
 }else if(tab==='inv'){
  const inv=Object.keys(S.parts).filter(pid=>owned(pid)>0&&matchFilter(pid));
  v.innerHTML=inv.map(pid=>partCard(pid,'__all__')).join('')||'<div class="empty">📦 Inventory empty. Mark items “Bought” from the Shopping tab.</div>';
 }else if(tab==='all'){
  const all=Object.keys(S.parts).filter(matchFilter);
  v.innerHTML=all.map(pid=>partCard(pid,'__all__')).join('')||'<div class="empty">No parts match.</div>';
 }else{
  v.innerHTML=S.projects.map(projCard).join('')||'<div class="empty">No projects.</div>';
 }
}
function projCard(pr){
 const bom=S.boms[pr.id]||[];
 const need=bom.reduce((a,b)=>a+b.qty,0);
 const have=bom.reduce((a,b)=>a+Math.min(b.qty,owned(b.partId)),0);
 const cost=bom.reduce((a,b)=>a+Math.max(0,b.qty-owned(b.partId))*(S.parts[b.partId]?.expectedPrice||0),0);
 const pct=need?Math.round(have/need*100):0;
 const stcls='st-'+pr.status.replace(/\s/g,'');
 const rows=bom.map(b=>{const p=S.parts[b.partId]||{name:b.partId};const short=Math.max(0,b.qty-owned(b.partId));
   return `<tr><td>${esc(p.name)} <span class="pid">${b.partId}</span></td><td class="n">${b.qty}</td><td class="n">${owned(b.partId)}</td><td class="n">${short>0?'<b style="color:var(--warn)">'+short+'</b>':'<span style="color:var(--ok)">✓</span>'}</td></tr>`}).join('');
 const safety=(pr.safety&&pr.safety.length)?`<div class="safety"><b>⚠ Safety</b><ul>${pr.safety.map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div>`:'';
 return `<div class="projcard" data-proj="${pr.id}">
  <h3>${esc(pr.name)}
    <select class="stsel ${stcls}" data-statusfor="${pr.id}">${STATUSES.map(s=>`<option${s===pr.status?' selected':''}>${s}</option>`).join('')}</select>
  </h3>
  <div class="sub">${esc(pr.room||'')}${pr.difficulty?' · '+esc(pr.difficulty):''}${pr.estimatedCost?' · '+esc(pr.estimatedCost):''}</div>
  <div class="desc" style="margin-top:6px">${esc(pr.summary||'')}</div>
  <div class="bar"><i style="width:${pct}%"></i></div>
  <div class="qtyrow"><span><b>${pct}%</b> parts in hand (${have}/${need})</span><span>≈ <b>${rup(cost)}</b> left to buy</span></div>
  ${safety}
  <table class="ptable"><tr><th>Part</th><th class="n">Need</th><th class="n">Own</th><th class="n">Buy</th></tr>${rows}</table>
  <div class="acts">
   <button class="btn small" data-act="shopproj" data-proj="${pr.id}">🛒 Shop this project</button>
   <button class="btn small" data-act="opendoc" data-proj="${pr.id}">📄 Build guide</button>
  </div>
 </div>`;
}

/* ================= EVENTS ================= */
document.addEventListener('click',e=>{
 const t=e.target.closest('.tab');
 if(t){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');tab=t.dataset.tab;render();return}
 const b=e.target.closest('[data-act]');if(!b)return;
 const act=b.dataset.act;
 if(act==='shopproj'){projFilter=b.dataset.proj;$('#projFilter').value=projFilter;tab='shop';
   document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='shop'));render();return}
 if(act==='opendoc'){window.open('projects/'+b.dataset.proj+'/project.html','_blank');return}
 const card=e.target.closest('[data-pid]');if(!card)return;
 const pid=card.dataset.pid;const p=S.parts[pid];
 const scope=projFilter||'active';
 if(act==='buy'){S.inv[pid]=owned(pid)+1;markDirty()}
 else if(act==='buyall'){S.inv[pid]=owned(pid)+toBuy(pid,tab==='shop'?scope:'__all__');markDirty()}
 else if(act==='minus'){if(owned(pid)>0){S.inv[pid]=owned(pid)-1;if(S.inv[pid]===0)delete S.inv[pid];markDirty()}}
 else if(act==='alt'){showAlt(card.querySelector('[data-aibox]'),pid);return}
 else if(act==='edit'){partDialog(pid);return}
 render();
});
$('#filter').addEventListener('input',e=>{filter=e.target.value;render()});
$('#projFilter').addEventListener('change',e=>{projFilter=e.target.value;render()});
document.addEventListener('change',e=>{
 const s=e.target.closest('[data-statusfor]');if(!s)return;
 const pr=S.projects.find(x=>x.id===s.dataset.statusfor);if(!pr)return;
 const old=pr.status;pr.status=s.value;
 const st=JSON.parse(localStorage.getItem(LS)||'{}');st.statusOverride=st.statusOverride||{};st.statusOverride[pr.id]=pr.status;localStorage.setItem(LS,JSON.stringify(st));
 if(pr.status==='Completed'&&old!=='Completed'){
  if(confirm('Mark "'+pr.name+'" complete and subtract its parts from your inventory? (Cancel = keep inventory as-is)')){
   (S.boms[pr.id]||[]).forEach(bm=>{const left=owned(bm.partId)-bm.qty;if(left>0)S.inv[bm.partId]=left;else delete S.inv[bm.partId]});
   toast('Inventory consumed for '+pr.name);
  }
 }
 markDirty();render();
});

/* ================= ALTERNATIVES (offline, from catalogue) ================= */
function showAlt(box,pid){
 const p=S.parts[pid];
 box.classList.toggle('show');
 if(!box.classList.contains('show'))return;
 let html=`<b>Alternatives for ${esc(p.name)}:</b><br>${esc(p.alternatives||'No alternatives noted yet — add some via ✎ edit, or ask in the project chat.')}`;
 if(p.sources&&p.sources.length)html+=`<br><br><b>Where to buy:</b> ${srcHtml(p)}`;
 box.innerHTML=html;
}

/* ================= GITHUB SYNC ================= */
function b64(str){return btoa(unescape(encodeURIComponent(str)))}
function updateSync(){
 const on=navigator.onLine;
 $('#netDot').className='dot '+(on?'on':'off');
 $('#netTxt').textContent=on?(S.loadedFrom==='cache'?'online (data from cache)':'online'):'offline — changes saved on this device';
 $('#dirtyWrap').style.display=S.dirty?'':'none';
 const ready=S.cfg.owner&&S.cfg.repo&&S.cfg.token&&on;
 $('#syncBtn').disabled=!ready;
 $('#syncBtn').title=ready?'Push inventory + statuses to GitHub':(!on?'Offline':'Add repo + token in Setup first');
}
async function ghPut(path,obj,message){
 const base=`https://api.github.com/repos/${S.cfg.owner}/${S.cfg.repo}/contents/${path}`;
 const h={'Authorization':'Bearer '+S.cfg.token,'Accept':'application/vnd.github+json'};
 let sha=null;
 try{const r=await fetch(base+'?ref='+S.cfg.branch,{headers:h});if(r.ok)sha=(await r.json()).sha}catch(e){}
 const body={message,content:b64(JSON.stringify(obj,null,2)),branch:S.cfg.branch};
 if(sha)body.sha=sha;
 const r=await fetch(base,{method:'PUT',headers:h,body:JSON.stringify(body)});
 if(!r.ok)throw new Error('GitHub '+r.status+' '+(await r.text()).slice(0,120));
}
async function syncGitHub(){
 const btn=$('#syncBtn');btn.disabled=true;const old=btn.textContent;btn.innerHTML='<span class="spin"></span> Syncing…';
 try{
  await ghPut('data/inventory.json',{schema:'inventory/v2',updated:new Date().toISOString().slice(0,10),note:'Physical stock only. App-owned file.',stock:S.inv},'Update inventory');
  // push any changed statuses
  for(const pr of S.projects){
   await ghPut('projects/'+pr.id+'/project.json',pr,'Update '+pr.id+' status → '+pr.status);
  }
  S.dirty=false;saveLocal();
  const st=JSON.parse(localStorage.getItem(LS)||'{}');delete st.statusOverride;localStorage.setItem(LS,JSON.stringify(st));
  toast('✓ Synced to GitHub');
 }catch(e){toast('Sync failed: '+e.message);alert('Sync failed:\n'+e.message+'\n\nCheck the token has "repo"/"Contents: write" permission and the repo name is correct.')}
 btn.textContent=old;updateSync();
}
$('#syncBtn').addEventListener('click',syncGitHub);
window.addEventListener('online',updateSync);window.addEventListener('offline',updateSync);

/* ================= DIALOGS ================= */
function cfgDialog(){
 const c=S.cfg;
 $('#dlgBody').innerHTML=`<h3>⚙ GitHub Setup</h3>
  <div class="note">All free. These let the app save your inventory back to your own repo. The token is stored only on this device, never shared.</div>
  <label>GitHub username (owner)</label><input id="cOwner" value="${esc(c.owner)}" placeholder="e.g. maazmujahid">
  <label>Repository name</label><input id="cRepo" value="${esc(c.repo)}" placeholder="e.g. Workshop">
  <div class="row2"><div><label>Branch</label><input id="cBranch" value="${esc(c.branch||'main')}"></div>
  <div><label>Personal access token</label><input id="cToken" type="password" value="${esc(c.token)}" placeholder="ghp_…"></div></div>
  <div class="note">Token: GitHub → Settings → Developer settings → <b>Fine-grained tokens</b> → your repo → <b>Contents: Read &amp; write</b>. Free, no expiry needed for personal use.</div>
  <div class="foot"><button class="btn" id="cCancel">Cancel</button><button class="btn primary" id="cSave">Save</button></div>`;
 const d=$('#dlg');d.showModal();
 $('#cCancel').onclick=()=>d.close();
 $('#cSave').onclick=()=>{S.cfg={owner:$('#cOwner').value.trim(),repo:$('#cRepo').value.trim(),branch:$('#cBranch').value.trim()||'main',token:$('#cToken').value.trim()};saveLocal();d.close();updateSync();toast('Setup saved')};
}
$('#cfgBtn').addEventListener('click',cfgDialog);

function partDialog(pid){
 const isNew=!pid;
 const p=pid?JSON.parse(JSON.stringify(S.parts[pid])):{name:'',category:'misc',spec:'',expectedPrice:0,sources:[],alternatives:'',notes:'',icon:''};
 const src0=(p.sources&&p.sources[0])||{shop:'',price:'',url:''};
 $('#dlgBody').innerHTML=`<h3>${isNew?'Add part':'Edit part'} ${isNew?'':'<span class="pid">'+pid+'</span>'}</h3>
  <label>Name</label><input id="fName" value="${esc(p.name)}">
  <div class="row2"><div><label>Category</label><select id="fCat">${Object.entries(CAT).map(([k,v])=>`<option value="${k}"${k===p.category?' selected':''}>${v}</option>`).join('')}</select></div>
  <div><label>Expected price ₹ (each)</label><input id="fPrice" type="number" step="0.1" min="0" value="${p.expectedPrice||0}"></div></div>
  <label>Spec / package</label><input id="fSpec" value="${esc(p.spec||'')}">
  <label>Notes</label><input id="fNotes" value="${esc(p.notes||'')}">
  <div class="row2"><div><label>Shop</label><input id="fShop" value="${esc(src0.shop)}"></div><div><label>Price</label><input id="fSprice" value="${esc(src0.price)}"></div></div>
  <label>Buy link (URL)</label><input id="fUrl" value="${esc(src0.url)}">
  <label>Alternatives (plain text — shown offline)</label><textarea id="fAlt" rows="3">${esc(p.alternatives||'')}</textarea>
  <label>Owned in inventory</label><input id="fOwn" type="number" min="0" value="${pid?owned(pid):0}">
  <div class="note">${isNew?'New parts get the next P-code. To attach it to a project BOM, mention it in that project’s chat so I add it to the repo.':'Edits are saved on this device; press Sync to push name/price/alt changes… note: only inventory + status sync automatically. Catalogue edits are best done in the project chat so they live in GitHub.'}</div>
  <div class="foot">${isNew?'<span></span>':'<button class="btn" id="fDel" style="color:var(--danger)">Remove</button>'}
   <span><button class="btn" id="fCancel">Cancel</button> <button class="btn primary" id="fSave">Save</button></span></div>`;
 const d=$('#dlg');d.showModal();
 $('#fCancel').onclick=()=>d.close();
 const del=$('#fDel');if(del)del.onclick=()=>{if(confirm('Remove this part from the local catalogue?')){delete S.parts[pid];delete S.inv[pid];markDirty();d.close();render()}};
 $('#fSave').onclick=()=>{
  const npid=pid||nextPid();
  const src=[];const sh=$('#fShop').value.trim();if(sh)src.push({shop:sh,price:$('#fSprice').value.trim(),url:$('#fUrl').value.trim()});
  S.parts[npid]={name:$('#fName').value.trim()||'Unnamed',category:$('#fCat').value,categoryLabel:CAT[$('#fCat').value],
   spec:$('#fSpec').value.trim(),icon:p.icon||'',expectedPrice:parseFloat($('#fPrice').value)||0,
   sources:src,alternatives:$('#fAlt').value.trim(),notes:$('#fNotes').value.trim()};
  const o=parseInt($('#fOwn').value)||0;if(o>0)S.inv[npid]=o;else delete S.inv[npid];
  markDirty();d.close();render();
 };
}
function nextPid(){let m=0;Object.keys(S.parts).forEach(k=>{const n=parseInt(k.replace(/\D/g,''));if(n>m)m=n});return 'P'+String(m+1).padStart(4,'0')}
$('#addPart').addEventListener('click',()=>partDialog(null));

/* ================= EXPORT ================= */
$('#copyList').addEventListener('click',()=>{
 const scope=projFilter||'active';
 const buy=partsInScope(scope).filter(pid=>toBuy(pid,scope)>0);
 let txt='🛒 SHOPPING LIST — '+new Date().toLocaleDateString('en-IN')+(projFilter?' ('+projName(projFilter)+')':'')+'\n';
 buy.forEach(pid=>{const p=S.parts[pid];const q=toBuy(pid,scope);
  txt+=`• ${p.name} — buy ${q}${p.expectedPrice?' @ ~₹'+p.expectedPrice+' = ₹'+Math.round(q*p.expectedPrice):' (salvage)'}${p.sources&&p.sources[0]?'  ['+p.sources[0].shop+']':''}\n`});
 txt+='\nTOTAL ≈ ₹'+Math.round(buy.reduce((a,pid)=>a+toBuy(pid,scope)*(S.parts[pid].expectedPrice||0),0)).toLocaleString('en-IN');
 (navigator.clipboard?navigator.clipboard.writeText(txt):Promise.reject()).then(()=>toast('Copied shopping list')).catch(()=>{prompt('Copy your list:',txt)});
});
$('#reloadBtn').addEventListener('click',async()=>{$('#reloadBtn').innerHTML='<span class="spin"></span>';try{await loadData(true);toast('Data reloaded'+(S.loadedFrom==='cache'?' (cache)':''))}catch(e){toast('Reload failed: '+e.message)}$('#reloadBtn').textContent='↻ Reload data';fillProjFilter();render();updateSync()});

/* ================= INIT ================= */
function fillProjFilter(){$('#projFilter').innerHTML='<option value="">All projects</option>'+S.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}
(async()=>{
 try{await loadData()}catch(e){$('#view').innerHTML='<div class="empty">Couldn’t load data files.<br><small>'+esc(e.message)+'</small><br><br>If you opened index.html directly (file://), some browsers block loading the JSON. Use it via GitHub Pages, or a local server.</div>';updateSync();return}
 fillProjFilter();render();updateSync();
 if(S.loadedFrom==='cache')toast('Offline — showing saved data');
})();
</script>
