<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Workshop">
<title>Workshop — Parts & Inventory</title>
<style>
/* ===== iOS / HIG design system ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
 color-scheme:light dark;
 --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,system-ui,sans-serif;
 --bg:#f2f2f7;--group:#fff;--card:#fff;--card2:#f2f2f7;
 --label:#1c1c1e;--label2:rgba(60,60,67,.6);--label3:rgba(60,60,67,.32);
 --sep:rgba(60,60,67,.16);--sep-strong:rgba(60,60,67,.28);
 --fill:rgba(118,118,128,.12);--fill2:rgba(118,118,128,.06);
 --tint:#007aff;--tint-ink:#0068e0;--tint-soft:rgba(0,122,255,.12);--on-tint:#fff;
 --red:#d70015;--orange:#c93400;--green:#248a3d;--blue:#0068e0;
 --orange-soft:rgba(201,52,0,.12);--green-soft:rgba(36,138,61,.12);
 --bar:rgba(249,249,251,.72);--shadow:0 1px 2px rgba(0,0,0,.05);
}
@media (prefers-color-scheme:dark){:root{
 --bg:#000;--group:#1c1c1e;--card:#1c1c1e;--card2:#2c2c2e;
 --label:#fff;--label2:rgba(235,235,245,.6);--label3:rgba(235,235,245,.3);
 --sep:rgba(84,84,88,.48);--sep-strong:rgba(84,84,88,.65);
 --fill:rgba(118,118,128,.24);--fill2:rgba(118,118,128,.16);
 --tint:#0a84ff;--tint-ink:#409cff;--tint-soft:rgba(10,132,255,.20);--on-tint:#fff;
 --red:#ff453a;--orange:#ff9f0a;--green:#30d158;--blue:#409cff;
 --orange-soft:rgba(255,159,10,.18);--green-soft:rgba(48,209,88,.18);
 --bar:rgba(30,30,32,.72);--shadow:0 1px 2px rgba(0,0,0,.4);
}}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--label);font-family:var(--font);font-size:17px;line-height:1.4;letter-spacing:-.01em;
 -webkit-font-smoothing:antialiased;max-width:720px;margin:0 auto;padding:0;
 padding-bottom:calc(70px + env(safe-area-inset-bottom))}
.app{padding:calc(env(safe-area-inset-top)) 16px 0}
/* large-title header */
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:14px 0 2px}
h1{font-size:34px;font-weight:700;letter-spacing:-.022em;line-height:1.04}
.sub{color:var(--label2);font-size:15px;margin-top:3px;letter-spacing:-.01em}
.navbtns{display:flex;gap:8px;align-items:center;padding-top:8px;flex:none}
.iconbtn{width:38px;height:38px;border-radius:50%;border:none;background:var(--fill);color:var(--tint);
 display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform .12s,background .2s}
.iconbtn svg{width:20px;height:20px}
.iconbtn:active{background:var(--fill2);transform:scale(.9)}
.iconbtn:disabled{opacity:.35}
.iconbtn.cta{background:var(--tint);color:var(--on-tint)}
.iconbtn.cta:disabled{background:var(--fill);color:var(--label3)}
/* status line */
.statusline{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--label2);margin:10px 0 2px;letter-spacing:-.005em}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:none}
.dot.on{background:var(--green)}.dot.off{background:var(--red)}
.pill-dirty{margin-left:auto;background:var(--tint-soft);color:var(--tint-ink);border-radius:20px;padding:3px 11px;font-weight:600;font-size:12px}
/* stat tiles */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0 4px}
.stat{background:var(--card);border-radius:14px;padding:11px 6px;text-align:center;box-shadow:var(--shadow)}
.stat b{display:block;font-size:20px;font-weight:700;letter-spacing:-.02em}
.stat span{font-size:11px;color:var(--label2);margin-top:1px;display:block;font-weight:500}
/* search + filter row */
.searchwrap{position:relative;margin:14px 0 10px}
.searchwrap .mag{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--label2);pointer-events:none}
#filter{width:100%;border:none;background:var(--fill);border-radius:11px;padding:10px 12px 10px 35px;font-size:17px;color:var(--label)}
#filter::placeholder{color:var(--label2)}#filter:focus{outline:none}
.filterrow{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
select#projFilter{flex:1;min-width:130px;border:none;background:var(--fill);border-radius:11px;padding:10px 12px;font-size:15px;color:var(--label);-webkit-appearance:none;appearance:none}
input,select,textarea,button{font:inherit}
input,select,textarea{border:none;background:var(--fill);border-radius:10px;padding:11px 12px;color:var(--label);font-size:17px}
input:focus,select:focus,textarea:focus{outline:2px solid var(--tint)}
/* buttons */
.btn{border:none;background:var(--fill);color:var(--tint);border-radius:10px;padding:9px 15px;cursor:pointer;font-weight:600;font-size:15px;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:transform .12s,opacity .2s}
.ic{width:20px;height:20px;flex:none}
.btn .ic{width:16px;height:16px}
.btn:active{transform:scale(.96);opacity:.8}
.btn.primary{background:var(--tint);color:var(--on-tint)}
.btn.small{padding:6px 12px;font-size:13px;border-radius:9px}
.btn:disabled{opacity:.4}
/* part card = iOS grouped row */
.card{background:var(--card);border-radius:16px;padding:12px;margin-bottom:12px;display:flex;gap:13px;align-items:flex-start;box-shadow:var(--shadow)}
.thumb{width:60px;height:60px;border-radius:14px;background:var(--card2);flex:none;display:flex;align-items:center;justify-content:center;overflow:hidden}
.thumb svg{width:46px;height:46px}.thumb img{width:100%;height:100%;object-fit:cover}
.caticon{display:inline-block;vertical-align:-2px;margin-left:5px;opacity:.5}.caticon svg{width:15px;height:15px}
.body{flex:1;min-width:0}
.name{font-weight:600;font-size:16px;letter-spacing:-.015em}
.pid{color:var(--label3);font-weight:500;font-size:12px;margin-left:5px}
.desc{color:var(--label2);font-size:13px;margin:2px 0 7px;line-height:1.35}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.chip{background:var(--fill);border-radius:7px;padding:3px 9px;font-size:12px;color:var(--label2);font-weight:500}
.chip.proj{background:var(--tint-soft);color:var(--tint-ink)}
.chip.buy{background:var(--orange-soft);color:var(--orange);font-weight:600}
.chip.ok{background:var(--green-soft);color:var(--green);font-weight:600}
.qtyrow{display:flex;gap:16px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--label2)}
.qtyrow b{font-size:15px;color:var(--label);font-weight:600}
.src{color:var(--label2);font-size:12px;margin-top:5px}
.src a{color:var(--blue);text-decoration:none}
.acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.price{font-weight:700;font-size:17px;white-space:nowrap;text-align:right;letter-spacing:-.02em}
.price small{display:block;font-weight:500;color:var(--label2);font-size:11px;margin-top:2px}
.section-total{background:var(--tint-soft);color:var(--tint-ink);border-radius:14px;padding:12px 16px;font-weight:600;font-size:15px;display:flex;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:6px}
.ai-inline{display:none;margin-top:10px;background:var(--card2);border-radius:12px;padding:11px 13px;font-size:14px;line-height:1.5;color:var(--label)}
.ai-inline.show{display:block}
.ai-inline b{color:var(--tint-ink)}
/* project card */
.projcard{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.projcard h3{font-size:20px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:space-between}
.stsel{border:none;border-radius:20px;padding:5px 13px;font-size:13px;font-weight:600;-webkit-appearance:none;appearance:none;text-align:center;cursor:pointer}
.st-Idea{background:var(--fill);color:var(--label2)}.st-Planned{background:var(--tint-soft);color:var(--tint-ink)}
.st-InProgress{background:var(--orange-soft);color:var(--orange)}.st-Completed{background:var(--green-soft);color:var(--green)}
.st-Cancelled{background:var(--fill);color:var(--label3)}
.bar{height:8px;background:var(--fill);border-radius:4px;margin:12px 0;overflow:hidden}.bar i{display:block;height:100%;background:var(--tint);border-radius:4px;transition:width .4s}
.ptable{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.ptable th,.ptable td{border-bottom:.5px solid var(--sep);padding:8px 6px;text-align:left}
.ptable tr:last-child td{border-bottom:none}
.ptable th{color:var(--label2);font-weight:600;font-size:12px}
.ptable td.n{text-align:right;white-space:nowrap}
.safety{background:var(--orange-soft);border-radius:12px;padding:11px 14px;font-size:13px;margin-top:12px;color:var(--label)}
.safety li{margin-left:18px;margin-top:3px}
/* dialog = iOS sheet */
dialog{border:none;border-radius:20px;padding:0;max-width:440px;width:92vw;background:var(--group);color:var(--label);box-shadow:0 20px 60px rgba(0,0,0,.3)}
dialog::backdrop{background:rgba(0,0,0,.4);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.dlg{padding:20px}.dlg h3{margin-bottom:12px;font-size:20px;font-weight:700}
.dlg label{display:block;font-size:13px;font-weight:600;color:var(--label2);margin:12px 0 4px}
.dlg input,.dlg select,.dlg textarea{width:100%}
.dlg .row2{display:flex;gap:10px}.dlg .row2>div{flex:1}
.dlg .foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:8px}
.dlg .note{font-size:12px;color:var(--label2);margin-top:8px;line-height:1.45}
.empty{text-align:center;color:var(--label2);padding:56px 20px;font-size:15px}
.spin{display:inline-block;width:15px;height:15px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:rgba(40,40,42,.92);color:#fff;padding:11px 20px;border-radius:22px;font-size:14px;font-weight:500;z-index:99;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* iOS bottom tab bar */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;gap:4px;
 padding:7px 8px calc(6px + env(safe-area-inset-bottom));
 background:var(--bar);backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);
 border-top:.5px solid var(--sep-strong)}
.tab{flex:1;max-width:130px;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;
 padding:3px 0;color:var(--label2);font-size:10px;font-weight:500;cursor:pointer;position:relative;transition:color .15s}
.tab svg{width:26px;height:26px}
.tab.active{color:var(--tint)}
.tab:active{opacity:.6}
.tab .cnt{position:absolute;top:-3px;left:calc(50% + 7px);background:var(--red);color:#fff;border-radius:10px;
 min-width:17px;height:17px;padding:0 4px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px var(--bar)}
.tab .cnt:empty{display:none}
#cInv,#cProj,#cAll{display:none}
/* thumbnail + category icon color */
.thumb{color:var(--tint)}.caticon{color:var(--label3)}
/* projects list cards */
.pcard{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:none;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;color:var(--label);font:inherit;transition:transform .12s}
.pcard:active{transform:scale(.985)}
.pcard-icon{width:44px;height:44px;border-radius:12px;background:var(--tint-soft);color:var(--tint);display:flex;align-items:center;justify-content:center;flex:none}
.pcard-icon .ic{width:22px;height:22px}
.pcard-icon.lg{width:56px;height:56px;border-radius:15px}.pcard-icon.lg .ic{width:28px;height:28px}
.pcard-body{flex:1;min-width:0}
.pcard-top{display:flex;align-items:center;gap:8px;justify-content:space-between}
.pcard-name{font-weight:600;font-size:16px;letter-spacing:-.015em}
.pcard-meta{color:var(--label2);font-size:13px;margin:2px 0 8px}
.pcard-foot{display:flex;justify-content:space-between;font-size:12px;color:var(--label2);margin-top:6px}
.pcard-chev{color:var(--label3);flex:none;display:flex}.pcard-chev .ic{width:20px;height:20px}
.stpill{border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600;white-space:nowrap}
/* project detail page */
.backbtn{display:inline-flex;align-items:center;gap:1px;background:none;border:none;color:var(--tint);font-size:16px;font-weight:500;cursor:pointer;padding:6px 0;margin-bottom:4px}
.backbtn .ic{width:22px;height:22px}
.detail-hero{display:flex;align-items:center;gap:14px;margin:4px 0 8px}
.detail-title{font-size:24px;font-weight:700;letter-spacing:-.02em;line-height:1.1}
.detail-meta{color:var(--label2);font-size:14px;margin-top:4px}
.detail-status{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:14px;padding:12px 16px;box-shadow:var(--shadow);margin:12px 0}
.detail-status .lbl{font-weight:500}
.section{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.section-h{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--label2);margin-bottom:8px}
.section-p{font-size:15px;line-height:1.5;color:var(--label)}
.section.warn{background:var(--orange-soft)}.section.warn .section-h{color:var(--orange)}
.safety-list{margin:0;padding-left:18px}.safety-list li{margin:5px 0;font-size:14px;line-height:1.4;color:var(--label)}
.diagram{width:100%;height:auto;border-radius:10px;background:#fff;padding:10px;margin-top:2px;cursor:zoom-in}
/* fullscreen pinch-zoom diagram viewer */
.zoomer{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.94);display:none;touch-action:none;overflow:hidden;overscroll-behavior:contain}
.zoomer.open{display:block}
.zoomer img{position:absolute;left:0;top:0;transform-origin:0 0;max-width:none;background:#fff;border-radius:6px;
 user-select:none;-webkit-user-select:none;-webkit-user-drag:none;pointer-events:none}
.zoomer-close{position:absolute;top:calc(10px + env(safe-area-inset-top));right:12px;z-index:2;width:38px;height:38px;border-radius:50%;
 border:none;background:rgba(118,118,128,.35);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.zoomer-close svg{width:20px;height:20px}
.zoomer-hint{position:absolute;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:2;
 color:rgba(255,255,255,.65);font-size:12px;background:rgba(40,40,42,.7);padding:6px 14px;border-radius:16px;pointer-events:none;white-space:nowrap}
/* setup tab form */
.setform label{display:block;font-size:13px;font-weight:600;color:var(--label2);margin:12px 0 4px}
.setform input{width:100%}
.setform .note{font-size:12px;color:var(--label2);margin-top:8px;line-height:1.45}
.actions-sec{display:flex;flex-direction:column;gap:10px;background:none;box-shadow:none;padding:0;margin-top:4px}
.btn.block{display:flex;width:100%;justify-content:center;padding:13px;font-size:16px;border-radius:13px}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div>
    <h1>Workshop</h1>
    <div class="sub">Parts &amp; inventory · Home Automation</div>
  </div>
  <div class="navbtns">
    <button class="iconbtn" id="reloadBtn" title="Reload data" aria-label="Reload data"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg></button>
    <button class="iconbtn cta" id="syncBtn" title="Sync to GitHub" aria-label="Sync to GitHub"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 13v8"/><path d="M4 14.9A7 7 0 1 1 15.7 8h1.8a4.5 4.5 0 0 1 2.5 8.2"/><path d="m8 17 4-4 4 4"/></svg></button>
  </div>
</div>

<div class="statusline">
  <span class="dot off" id="netDot"></span><span id="netTxt">checking…</span>
  <span id="dirtyWrap" style="display:none"><span class="pill-dirty" id="dirtyTxt">unsaved changes</span></span>
</div>

<div class="stats">
  <div class="stat"><b id="stBuy">–</b><span>to buy</span></div>
  <div class="stat"><b id="stCost">–</b><span>est. cost</span></div>
  <div class="stat"><b id="stOwn">–</b><span>owned</span></div>
  <div class="stat"><b id="stProj">–</b><span>projects</span></div>
</div>

<div class="searchwrap">
  <svg class="mag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
  <input id="filter" placeholder="Search parts">
</div>
<div class="filterrow">
  <select id="projFilter"><option value="">All projects</option></select>
  <button class="btn" id="addPart">+ Part</button>
  <button class="btn" id="copyList" title="Copy shopping list as text">Copy list</button>
</div>

<div id="view"><div class="empty"><span class="spin"></span> Loading workshop data…</div></div>
</div>

<nav class="tabbar">
  <button class="tab active" data-tab="shop"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg><span>Shopping</span><span class="cnt" id="cShop"></span></button>
  <button class="tab" data-tab="inv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg><span>Inventory</span><span class="cnt" id="cInv"></span></button>

/* ================= STATE ================= */
const LS='ws-state-v1';
let S={parts:{},projects:[],boms:{},inv:{},cfg:{owner:'',repo:'',branch:'main',token:''},dirty:false,loadedFrom:''};
let tab='shop',filter='',projFilter='',projSel=null;

const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':(''+s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const rup=n=>'₹'+(Math.round(n*10)/10).toLocaleString('en-IN');
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

function saveLocal(){localStorage.setItem(LS,JSON.stringify({inv:S.inv,cfg:S.cfg,dirty:S.dirty,cache:{parts:S.parts,projects:S.projects,boms:S.boms}}))}
function markDirty(){S.dirty=true;saveLocal();updateSync()}

/* ================= DATA LOADING ================= */
async function fetchJSON(path){
 const r=await fetch(path+'?t='+Date.now(),{cache:'no-store'});
 if(!r.ok)throw new Error(path+' '+r.status);
 return r.json();
}
// Read a repo file preferring the GitHub API over the deployed Pages copy.
// The Pages copy only refreshes after a rebuild (~10s–2min after a push), so a
// Sync on one device would lag on another. The API reflects a commit instantly,
// which matters for the app-written files (inventory + project status). Used only
// when a token is configured (authenticated: 5000 reads/hr); otherwise, and on any
// failure, fall back to the Pages copy so anonymous/offline loads still work.
async function fetchRepoJSON(path){
 const c=S.cfg;
 if(c.owner&&c.repo&&c.token){
  try{
   const url=`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${path}?ref=${c.branch}&t=`+Date.now();
   const r=await fetch(url,{headers:{'Accept':'application/vnd.github.raw+json','Authorization':'Bearer '+c.token},cache:'no-store'});
   if(r.ok)return JSON.parse(await r.text());
  }catch(e){/* fall through to the Pages copy */}
 }
 return fetchJSON(path);
}
async function loadData(force){
 const saved=JSON.parse(localStorage.getItem(LS)||'{}');
 if(saved.cfg)S.cfg=Object.assign(S.cfg,saved.cfg);
 if(saved.inv)S.inv=saved.inv;
 if(saved.dirty)S.dirty=saved.dirty;
 try{
  const [parts,projList]=await Promise.all([fetchJSON('data/parts.json'),fetchJSON('data/projects.json')]);
  S.parts=parts.parts||{};
  const slugs=projList.projects||[];
  const projs=[],boms={};
  for(const slug of slugs){
   try{
    const [pj,bm]=await Promise.all([fetchRepoJSON('projects/'+slug+'/project.json'),fetchJSON('projects/'+slug+'/bom.json')]);
    projs.push(pj);boms[slug]=bm.items||[];
   }catch(e){console.warn('project load fail',slug,e)}
  }
  S.projects=projs;S.boms=boms;S.loadedFrom='github';
  // Inventory is app-owned and GitHub is the source of truth, so refresh it from
  // the repo on every successful load — that's how a sync on one device shows up
  // on another. The one exception: if this device has unsynced local edits
  // (dirty), keep them so a reload doesn't silently discard un-pushed stock.
  if(!S.dirty){
   try{const iv=await fetchRepoJSON('data/inventory.json');S.inv=iv.stock||{}}catch(e){if(!saved.inv)S.inv={}}
  }
  // merge in any project-status overrides the user changed locally but hasn't synced
  if(saved.statusOverride){for(const p of S.projects){if(saved.statusOverride[p.id])p.status=saved.statusOverride[p.id]}}
  saveLocal();
  return true;
 }catch(e){
  // offline / file:// — fall back to cache
  if(saved.cache&&saved.cache.parts){
   S.parts=saved.cache.parts;S.projects=saved.cache.projects||[];S.boms=saved.cache.boms||{};
   S.loadedFrom='cache';return true;
  }
  throw e;
 }
}

/* ================= CALC ================= */
function needFor(pid,scope){ // scope: 'active' | slug
 let n=0;
 for(const p of S.projects){
  if(scope==='active'){if(!ACTIVE.includes(p.status))continue}
  else{if(p.id!==scope)continue}
  const item=(S.boms[p.id]||[]).find(b=>b.partId===pid);
  if(item)n+=item.qty;
 }
 return n;
}
const owned=pid=>S.inv[pid]||0;
function toBuy(pid,scope){return Math.max(0,needFor(pid,scope)-owned(pid))}
function partsInScope(scope){
 const set=new Set();
 for(const p of S.projects){
  if(scope==='active'){if(!ACTIVE.includes(p.status))continue}
  else if(scope!=='__all__'){if(p.id!==scope)continue}
  (S.boms[p.id]||[]).forEach(b=>set.add(b.partId));
 }
 return [...set];
}
function projName(id){const p=S.projects.find(x=>x.id===id);return p?p.name:id}

/* ================= RENDER ================= */
function stats(){
 const scope=projFilter||'active';
 const buy=partsInScope(scope).filter(pid=>toBuy(pid,scope)>0);
 $('#stBuy').textContent=buy.length;
 $('#stCost').textContent=rup(buy.reduce((a,pid)=>a+toBuy(pid,scope)*(S.parts[pid]?.expectedPrice||0),0));
 $('#stOwn').textContent=Object.values(S.inv).reduce((a,b)=>a+b,0);
 $('#stProj').textContent=S.projects.length;
 $('#cShop').textContent=buy.length||'';
 $('#cInv').textContent=Object.keys(S.inv).filter(k=>S.inv[k]>0).length;
 $('#cAll').textContent=Object.keys(S.parts).length;
 $('#cProj').textContent=S.projects.length;
}
function bigPic(part){return PICS[part.icon]||ICONS[part.category]||ICONS.misc}
function catIcon(part){return ICONS[part.category]||ICONS.misc}
function srcHtml(part){
 if(!part.sources||!part.sources.length)return '';
 return part.sources.map(s=>{
  const label=esc(s.shop)+(s.price?' ₹'+esc(s.price):'');
  return s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${label}</a>`:label;
 }).join(' · ');
}
function matchFilter(pid){
 const p=S.parts[pid];if(!p)return false;
 if(!filter)return true;
 const f=filter.toLowerCase();
 return (pid+' '+p.name+' '+(p.spec||'')+' '+CAT[p.category]+' '+(p.alternatives||'')).toLowerCase().includes(f);
}
function partCard(pid,scope){
 const p=S.parts[pid];if(!p)return '';
 const need=needFor(pid,scope==='active'?'active':scope);
 const nb=Math.max(0,need-owned(pid));
 const status=nb>0?`<span class="chip buy">need ${nb} more</span>`:(need>0?`<span class="chip ok">✓ covered</span>`:'');
 const projChips=S.projects.filter(pr=>(S.boms[pr.id]||[]).some(b=>b.partId===pid))
   .map(pr=>{const q=(S.boms[pr.id]||[]).find(b=>b.partId===pid).qty;return `<span class="chip proj">${esc(pr.name)} ×${q}</span>`}).join('');
 const showQty=nb>0?nb:(need||owned(pid));
 return `<div class="card" data-pid="${pid}">
  <div class="thumb">${bigPic(p)}</div>
  <div class="body">
   <div class="name">${esc(p.name)}<span class="pid">${pid}</span><span class="caticon" title="${CAT[p.category]}">${catIcon(p)}</span></div>
   <div class="desc">${esc(p.spec||'')}${p.notes?' — '+esc(p.notes):''}</div>
   <div class="chips"><span class="chip">${CAT[p.category]}</span>${projChips}${status}</div>
   <div class="qtyrow"><span>need <b>${need}</b></span><span>own <b>${owned(pid)}</b></span></div>
   <div class="src">${srcHtml(p)}</div>
   <div class="acts">
    ${nb>0?`<button class="btn small primary" data-act="buy">${ic('plus')}Bought 1</button><button class="btn small" data-act="buyall">${ic('checks')}All ${nb}</button>`:''}
    ${owned(pid)>0?`<button class="btn small" data-act="minus">${ic('minus')}1</button>`:''}
    <button class="btn small" data-act="alt">${ic('bulb')}Alternatives</button>
    <button class="btn small" data-act="edit">${ic('pencil')}</button>
   </div>
   <div class="ai-inline" data-aibox></div>
  </div>
  <div class="price">${p.expectedPrice?rup(p.expectedPrice):'FREE'}${p.expectedPrice?`<small>×${showQty} = ${rup(p.expectedPrice*showQty)}</small>`:'<small>salvage</small>'}</div>
 </div>`;
}
function render(){
 if(!Object.keys(S.parts).length&&tab!=='setup')return;
 const chrome=tab!=='setup';
 $('.searchwrap').style.display=chrome?'':'none';
 $('.filterrow').style.display=chrome?'':'none';
 $('.stats').style.display=chrome?'':'none';
 const v=$('#view');
 if(tab==='setup'){v.innerHTML=setupView();return}
 stats();
 if(tab==='shop'){
  const scope=projFilter||'active';
  let buy=partsInScope(scope).filter(pid=>toBuy(pid,scope)>0&&matchFilter(pid));
  buy.sort((a,b)=>toBuy(b,scope)*(S.parts[b].expectedPrice||0)-toBuy(a,scope)*(S.parts[a].expectedPrice||0));
  const total=buy.reduce((a,pid)=>a+toBuy(pid,scope)*(S.parts[pid].expectedPrice||0),0);
  const scopeLbl=projFilter?projName(projFilter):'all active projects';
  v.innerHTML=(buy.length?`<div class="section-total"><span>${buy.length} items · ${esc(scopeLbl)}</span><span>expected ${rup(total)}</span></div>`:'')+
   (buy.map(pid=>partCard(pid,scope)).join('')||'<div class="empty">Nothing to buy for this scope — all covered.</div>');
 }else if(tab==='inv'){
  const inv=Object.keys(S.parts).filter(pid=>owned(pid)>0&&matchFilter(pid));
  v.innerHTML=inv.map(pid=>partCard(pid,'__all__')).join('')||'<div class="empty">📦 Inventory empty. Mark items “Bought” from the Shopping tab.</div>';
 }else if(tab==='all'){
  const all=Object.keys(S.parts).filter(matchFilter);
  v.innerHTML=all.map(pid=>partCard(pid,'__all__')).join('')||'<div class="empty">No parts match.</div>';
 }else{
  if(projSel){const pr=S.projects.find(p=>p.id===projSel);v.innerHTML=pr?projectDetail(pr):'';}
  else v.innerHTML=S.projects.map(projSummary).join('')||'<div class="empty">No projects.</div>';
 }
}
function projStats(pr){
 const bom=S.boms[pr.id]||[];
 const need=bom.reduce((a,b)=>a+b.qty,0);
 const have=bom.reduce((a,b)=>a+Math.min(b.qty,owned(b.partId)),0);
 const cost=bom.reduce((a,b)=>a+Math.max(0,b.qty-owned(b.partId))*(S.parts[b.partId]?.expectedPrice||0),0);
 return {bom,need,have,cost,pct:need?Math.round(have/need*100):0};
}
function projSummary(pr){
 const {need,have,cost,pct}=projStats(pr);
 const stcls='st-'+pr.status.replace(/\s/g,'');
 return `<button class="pcard" data-projopen="${pr.id}">
  <div class="pcard-icon">${ic('book')}</div>
  <div class="pcard-body">
   <div class="pcard-top"><span class="pcard-name">${esc(pr.name)}</span><span class="stpill ${stcls}">${esc(pr.status)}</span></div>
   <div class="pcard-meta">${esc(pr.room||'')}${pr.difficulty?' · '+esc(pr.difficulty):''}${pr.estimatedCost?' · '+esc(pr.estimatedCost):''}</div>
   <div class="bar"><i style="width:${pct}%"></i></div>
   <div class="pcard-foot"><span>${pct}% in hand (${have}/${need})</span><span>${cost>0?rup(cost)+' to buy':'✓ all in hand'}</span></div>
  </div>
  <div class="pcard-chev">${ic('chevright')}</div>
 </button>`;
}
function projectDetail(pr){
 const {bom,need,have,cost,pct}=projStats(pr);
 const stcls='st-'+pr.status.replace(/\s/g,'');
 const rows=bom.map(b=>{const p=S.parts[b.partId]||{name:b.partId};const short=Math.max(0,b.qty-owned(b.partId));
   return `<tr><td>${esc(p.name)} <span class="pid">${b.partId}</span></td><td class="n">${b.qty}</td><td class="n">${owned(b.partId)}</td><td class="n">${short>0?'<b style="color:var(--orange)">'+short+'</b>':'<span style="color:var(--green)">✓</span>'}</td></tr>`}).join('');
 const safety=(pr.safety&&pr.safety.length)?`<div class="section warn"><div class="section-h">⚠ Safety</div><ul class="safety-list">${pr.safety.map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div>`:'';
 return `<button class="backbtn" data-act="back">${ic('chevleft')}Projects</button>
  <div class="detail-hero">
   <div class="pcard-icon lg">${ic('book')}</div>
   <div><div class="detail-title">${esc(pr.name)}</div>
   <div class="detail-meta">${esc(pr.room||'')}${pr.difficulty?' · '+esc(pr.difficulty):''}${pr.estimatedCost?' · '+esc(pr.estimatedCost):''}</div></div>
  </div>
  <div class="detail-status"><span class="lbl">Status</span><select class="stsel ${stcls}" data-statusfor="${pr.id}">${STATUSES.map(s=>`<option${s===pr.status?' selected':''}>${s}</option>`).join('')}</select></div>
  <div class="section"><div class="section-h">Overview</div><p class="section-p">${esc(pr.summary||'')}</p></div>
  <div class="section"><div class="section-h">Progress</div>
   <div class="bar"><i style="width:${pct}%"></i></div>
   <div class="qtyrow"><span><b>${pct}%</b> parts in hand (${have}/${need})</span><span>≈ <b>${rup(cost)}</b> left to buy</span></div>
  </div>
  ${safety}
  <div class="section"><div class="section-h">Circuit diagram</div>
   <img class="diagram" src="projects/${pr.id}/circuit-diagram.svg" alt="Circuit diagram — tap to open full screen" onerror="this.closest('.section').remove()">
  </div>
  <div class="section"><div class="section-h">Parts</div>
   <table class="ptable"><tr><th>Part</th><th class="n">Need</th><th class="n">Own</th><th class="n">Buy</th></tr>${rows}</table>
  </div>
  <div class="actions-sec">
   <button class="btn primary block" data-act="opendoc" data-proj="${pr.id}">${ic('book')}Open full build guide</button>
   <button class="btn block" data-act="shopproj" data-proj="${pr.id}">${ic('shop')}Shop this project</button>
  </div>`;
}

/* ================= EVENTS ================= */
document.addEventListener('click',e=>{
 const t=e.target.closest('.tab');
 if(t){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');tab=t.dataset.tab;projSel=null;render();window.scrollTo(0,0);return}
 const po=e.target.closest('[data-projopen]');
 if(po){projSel=po.dataset.projopen;render();window.scrollTo(0,0);return}
 const dg=e.target.closest('img.diagram');
 if(dg){openZoom(dg.getAttribute('src'));return}
 const b=e.target.closest('[data-act]');if(!b)return;
 const act=b.dataset.act;
 if(act==='back'){projSel=null;render();window.scrollTo(0,0);return}
 if(act==='cfgsave'){S.cfg={owner:$('#cOwner').value.trim(),repo:$('#cRepo').value.trim(),branch:$('#cBranch').value.trim()||'main',token:$('#cToken').value.trim()};saveLocal();updateSync();toast('Setup saved');return}
 if(act==='shopproj'){projFilter=b.dataset.proj;$('#projFilter').value=projFilter;tab='shop';projSel=null;
   document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='shop'));render();return}
 if(act==='opendoc'){window.open('projects/'+b.dataset.proj+'/project.html','_blank');return}
 const card=e.target.closest('[data-pid]');if(!card)return;
 const pid=card.dataset.pid;const p=S.parts[pid];
 const scope=projFilter||'active';
 if(act==='buy'){S.inv[pid]=owned(pid)+1;markDirty()}
 else if(act==='buyall'){S.inv[pid]=owned(pid)+toBuy(pid,tab==='shop'?scope:'__all__');markDirty()}
 else if(act==='minus'){if(owned(pid)>0){S.inv[pid]=owned(pid)-1;if(S.inv[pid]===0)delete S.inv[pid];markDirty()}}
 else if(act==='alt'){showAlt(card.querySelector('[data-aibox]'),pid);return}
 else if(act==='edit'){partDialog(pid);return}
 render();
});

$('#projFilter').addEventListener('change',e=>{projFilter=e.target.value;render()});
document.addEventListener('change',e=>{

 const old=pr.status;pr.status=s.value;

/* ================= FULLSCREEN DIAGRAM VIEWER (pinch / scroll zoom, pan) ================= */
const zoomEl=$('#zoomer'),zoomImg=$('#zoomImg');
const Z={w:0,x:0,y:0,fitW:0,ptrs:new Map(),lastDist:0,down:null,lastTap:0};
// Zoom by changing layout width (not CSS scale): the browser re-renders the SVG
// at each size, so vector diagrams stay razor sharp at any zoom level.
function zApply(){zoomImg.style.width=Z.w+'px';zoomImg.style.transform=`translate(${Z.x}px,${Z.y}px)`}
function zFit(){
 const vw=innerWidth,vh=innerHeight,iw=zoomImg.naturalWidth||1,ih=zoomImg.naturalHeight||1;
 Z.fitW=iw*Math.min((vw-24)/iw,(vh-24)/ih);
 Z.w=Z.fitW;Z.x=(vw-Z.w)/2;Z.y=(vh-Z.w*ih/iw)/2;zApply();
}
function zZoomAt(f,cx,cy){
 const nw=Math.min(Math.max(Z.w*f,Z.fitW*.5),Z.fitW*14);
 const r=nw/Z.w;Z.x=cx-(cx-Z.x)*r;Z.y=cy-(cy-Z.y)*r;Z.w=nw;zApply();
}
function openZoom(src){
 zoomImg.removeAttribute('style');zoomImg.src=src;
 zoomEl.classList.add('open');document.body.style.overflow='hidden';
 if(zoomImg.complete&&zoomImg.naturalWidth)zFit();else zoomImg.onload=zFit;
}
function closeZoom(){zoomEl.classList.remove('open');document.body.style.overflow='';Z.ptrs.clear();Z.lastDist=0}
$('#zoomClose').addEventListener('click',e=>{e.stopPropagation();closeZoom()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&zoomEl.classList.contains('open'))closeZoom()});
zoomEl.addEventListener('pointerdown',e=>{
 if(e.target.closest('.zoomer-close'))return;
 e.preventDefault();zoomEl.setPointerCapture(e.pointerId);
 Z.ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
 if(Z.ptrs.size===1)Z.down={x:e.clientX,y:e.clientY,t:Date.now(),moved:false};
 if(Z.ptrs.size===2){const p=[...Z.ptrs.values()];Z.lastDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y)}
});
zoomEl.addEventListener('pointermove',e=>{
 if(!Z.ptrs.has(e.pointerId))return;
 const prev=Z.ptrs.get(e.pointerId);Z.ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
 if(Z.down&&Math.hypot(e.clientX-Z.down.x,e.clientY-Z.down.y)>10)Z.down.moved=true;
 if(Z.ptrs.size===1){Z.x+=e.clientX-prev.x;Z.y+=e.clientY-prev.y;zApply()}
 else if(Z.ptrs.size===2){
  const p=[...Z.ptrs.values()];
  const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
  if(Z.lastDist>0)zZoomAt(d/Z.lastDist,(p[0].x+p[1].x)/2,(p[0].y+p[1].y)/2);
  Z.lastDist=d;
 }
});
function zEnd(e){
 Z.ptrs.delete(e.pointerId);Z.lastDist=0;
 if(e.type==='pointerup'&&Z.ptrs.size===0&&Z.down&&!Z.down.moved&&Date.now()-Z.down.t<300){
  const now=Date.now();
  if(now-Z.lastTap<300){ // double-tap: toggle between fit and 3×
   if(Z.w>Z.fitW*1.15)zFit();else zZoomAt(3,e.clientX,e.clientY);
   Z.lastTap=0;
  }else Z.lastTap=now;
 }
 if(Z.ptrs.size===0)Z.down=null;
}
zoomEl.addEventListener('pointerup',zEnd);
zoomEl.addEventListener('pointercancel',zEnd);
zoomEl.addEventListener('wheel',e=>{e.preventDefault();zZoomAt(e.deltaY<0?1.15:1/1.15,e.clientX,e.clientY)},{passive:false});
zoomEl.addEventListener('gesturestart',e=>e.preventDefault()); // stop iOS Safari page-pinch under the overlay

/* ================= GITHUB SYNC ================= */
function b64(str){return btoa(unescape(encodeURIComponent(str)))}
function updateSync(){
 const on=navigator.onLine;
 $('#netDot').className='dot '+(on?'on':'off');
 $('#netTxt').textContent=on?(S.loadedFrom==='cache'?'online (data from cache)':'online'):'offline — changes saved on this device';
 $('#dirtyWrap').style.display=S.dirty?'':'none';
 const ready=S.cfg.owner&&S.cfg.repo&&S.cfg.token&&on;
 $('#syncBtn').disabled=!ready;
 $('#syncBtn').title=ready?'Push inventory + statuses to GitHub':(!on?'Offline':'Add repo + token in Setup first');
}
async function ghPut(path,obj,message){
 const base=`https://api.github.com/repos/${S.cfg.owner}/${S.cfg.repo}/contents/${path}`;
 const h={'Authorization':'Bearer '+S.cfg.token,'Accept':'application/vnd.github+json'};
 const content=b64(JSON.stringify(obj,null,2));
 // cache:'no-store' — must read the *current* sha, never a stale browser-cached one,
 // or GitHub rejects the PUT with 409 "does not match".
 async function getSha(){try{const r=await fetch(base+'?ref='+S.cfg.branch,{headers:h,cache:'no-store'});if(r.ok)return (await r.json()).sha}catch(e){}return null}
 async function put(sha){const body={message,content,branch:S.cfg.branch};if(sha)body.sha=sha;return fetch(base,{method:'PUT',headers:h,body:JSON.stringify(body)})}
 let r=await put(await getSha());
 // If another device pushed between our sha read and this write, the sha is stale.
 // Re-read it and retry once so a benign cross-device race doesn't surface as an error.
 if(r.status===409||r.status===422){r=await put(await getSha())}
 if(!r.ok)throw new Error('GitHub '+r.status+' '+(await r.text()).slice(0,120));
}
async function syncGitHub(){
 const btn=$('#syncBtn');btn.disabled=true;const old=btn.innerHTML;btn.innerHTML='<span class="spin"></span>';
 try{
  await ghPut('data/inventory.json',{schema:'inventory/v2',updated:new Date().toISOString().slice(0,10),note:'Physical stock only. App-owned file.',stock:S.inv},'Update inventory');
  // push any changed statuses
  for(const pr of S.projects){
   await ghPut('projects/'+pr.id+'/project.json',pr,'Update '+pr.id+' status → '+pr.status);
  }
  S.dirty=false;saveLocal();
  const st=JSON.parse(localStorage.getItem(LS)||'{}');delete st.statusOverride;localStorage.setItem(LS,JSON.stringify(st));
  toast('✓ Synced to GitHub');
 }catch(e){toast('Sync failed: '+e.message);alert('Sync failed:\n'+e.message+'\n\nCheck the token has "repo"/"Contents: write" permission and the repo name is correct.')}
 btn.innerHTML=old;updateSync();
}
$('#syncBtn').addEventListener('click',syncGitHub);
window.addEventListener('online',updateSync);window.addEventListener('offline',updateSync);

function partDialog(pid){
 const isNew=!pid;
 const p=pid?JSON.parse(JSON.stringify(S.parts[pid])):{name:'',category:'misc',spec:'',expectedPrice:0,sources:[],alternatives:'',notes:'',icon:''};
 const src0=(p.sources&&p.sources[0])||{shop:'',price:'',url:''};
 $('#dlgBody').innerHTML=`<h3>${isNew?'Add part':'Edit part'} ${isNew?'':'<span class="pid">'+pid+'</span>'}</h3>
  <label>Name</label><input id="fName" value="${esc(p.name)}">
  <div class="row2"><div><label>Category</label><select id="fCat">${Object.entries(CAT).map(([k,v])=>`<option value="${k}"${k===p.category?' selected':''}>${v}</option>`).join('')}</select></div>
  <div><label>Expected price ₹ (each)</label><input id="fPrice" type="number" step="0.1" min="0" value="${p.expectedPrice||0}"></div></div>
  <label>Spec / package</label><input id="fSpec" value="${esc(p.spec||'')}">
  <label>Notes</label><input id="fNotes" value="${esc(p.notes||'')}">
  <div class="row2"><div><label>Shop</label><input id="fShop" value="${esc(src0.shop)}"></div><div><label>Price</label><input id="fSprice" value="${esc(src0.price)}"></div></div>
  <label>Buy link (URL)</label><input id="fUrl" value="${esc(src0.url)}">
  <label>Alternatives (plain text — shown offline)</label><textarea id="fAlt" rows="3">${esc(p.alternatives||'')}</textarea>
  <label>Owned in inventory</label><input id="fOwn" type="number" min="0" value="${pid?owned(pid):0}">
  <div class="note">${isNew?'New parts get the next P-code. To attach it to a project BOM, mention it in that project’s chat so I add it to the repo.':'Edits are saved on this device; press Sync to push name/price/alt changes… note: only inventory + status sync automatically. Catalogue edits are best done in the project chat so they live in GitHub.'}</div>
  <div class="foot">${isNew?'<span></span>':'<button class="btn" id="fDel" style="color:var(--danger)">Remove</button>'}
   <span><button class="btn" id="fCancel">Cancel</button> <button class="btn primary" id="fSave">Save</button></span></div>`;
 const d=$('#dlg');d.showModal();
 $('#fCancel').onclick=()=>d.close();
 const del=$('#fDel');if(del)del.onclick=()=>{if(confirm('Remove this part from the local catalogue?')){delete S.parts[pid];delete S.inv[pid];markDirty();d.close();render()}};
 $('#fSave').onclick=()=>{
  const npid=pid||nextPid();
  const src=[];const sh=$('#fShop').value.trim();if(sh)src.push({shop:sh,price:$('#fSprice').value.trim(),url:$('#fUrl').value.trim()});
  S.parts[npid]={name:$('#fName').value.trim()||'Unnamed',category:$('#fCat').value,categoryLabel:CAT[$('#fCat').value],
   spec:$('#fSpec').value.trim(),icon:p.icon||'',expectedPrice:parseFloat($('#fPrice').value)||0,
   sources:src,alternatives:$('#fAlt').value.trim(),notes:$('#fNotes').value.trim()};
  const o=parseInt($('#fOwn').value)||0;if(o>0)S.inv[npid]=o;else delete S.inv[npid];
  markDirty();d.close();render();
 };
}
function nextPid(){let m=0;Object.keys(S.parts).forEach(k=>{const n=parseInt(k.replace(/\D/g,''));if(n>m)m=n});return 'P'+String(m+1).padStart(4,'0')}
$('#addPart').addEventListener('click',()=>partDialog(null));

$('#copyList').addEventListener('click',()=>{
 const scope=projFilter||'active';
 const buy=partsInScope(scope).filter(pid=>toBuy(pid,scope)>0);
 let txt='🛒 SHOPPING LIST — '+new Date().toLocaleDateString('en-IN')+(projFilter?' ('+projName(projFilter)+')':'')+'\n';
 buy.forEach(pid=>{const p=S.parts[pid];const q=toBuy(pid,scope);
  txt+=`• ${p.name} — buy ${q}${p.expectedPrice?' @ ~₹'+p.expectedPrice+' = ₹'+Math.round(q*p.expectedPrice):' (salvage)'}${p.sources&&p.sources[0]?'  ['+p.sources[0].shop+']':''}\n`});
 txt+='\nTOTAL ≈ ₹'+Math.round(buy.reduce((a,pid)=>a+toBuy(pid,scope)*(S.parts[pid].expectedPrice||0),0)).toLocaleString('en-IN');
 (navigator.clipboard?navigator.clipboard.writeText(txt):Promise.reject()).then(()=>toast('Copied shopping list')).catch(()=>{prompt('Copy your list:',txt)});
});
