<svg viewBox="0 0 1480 1300" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <style>
    .box{fill:#f7f7f7;stroke:#333;stroke-width:2}
    .mains{stroke:#d62828;stroke-width:3;fill:none}
    .neutral{stroke:#1d3557;stroke-width:3;fill:none}
    .v5{stroke:#e07b00;stroke-width:2.5;fill:none}
    .gnd{stroke:#666;stroke-width:2.5;fill:none}
    .sig{stroke:#2a9d2a;stroke-width:2.2;fill:none}
    .lbl{font-size:15px;font-weight:bold;fill:#111}
    .pin{font-size:13px;fill:#222}
    .net{font-size:13px;font-weight:bold}
    .title{font-size:22px;font-weight:bold;fill:#111}
    .sub{font-size:16px;font-weight:bold;fill:#0a4a8f}
    .note{font-size:12px;fill:#666;font-style:italic}
    .dot{fill:#000}
  </style>

  <text x="30" y="38" class="title">Presence Lighting — Bedroom · Circuit Diagram (v2)</text>
  <text x="30" y="60" class="note">Net labels: wires with the same name (L-SW1, L-SW2, N) are the same physical wire. Dot = connected · crossing without dot = NOT connected.</text>

  <!-- ============ NODE 1 ============ -->
  <text x="30" y="100" class="sub">NODE 1 — CEILING BOX (ESP32 · LD2410C · 2-ch Relay · HLK-PM05)</text>

  <!-- Wall switches -->
  <rect x="40" y="125" width="170" height="70" class="box" rx="6"/>
  <text x="55" y="152" class="lbl">Wall Switch 1</text>
  <text x="55" y="172" class="pin">parked ON</text>
  <path class="mains" d="M210 160 H380"/>
  <text x="250" y="150" class="net" fill="#d62828">L-SW1</text>

  <rect x="40" y="230" width="170" height="70" class="box" rx="6"/>
  <text x="55" y="257" class="lbl">Wall Switch 2</text>
  <text x="55" y="277" class="pin">parked ON</text>
  <path class="mains" d="M210 265 H250"/>
  <text x="254" y="269" class="net" fill="#d62828">L-SW2</text>

  <text x="40" y="330" class="note">Switched-live reaches the light points via existing buried wiring — no new wall runs.</text>

  <!-- Fuse + PSU chain -->
  <rect x="380" y="138" width="90" height="44" class="box" rx="6"/>
  <text x="395" y="165" class="pin">FUSE 1A</text>
  <path class="mains" d="M470 160 H520"/>

  <rect x="520" y="125" width="180" height="105" class="box" rx="6"/>
  <text x="535" y="150" class="lbl">HLK-PM05</text>
  <text x="535" y="168" class="pin">230 VAC → 5 V / 1 A</text>
  <text x="528" y="165" class="pin">L</text>
  <text x="527" y="216" class="pin">N</text>
  <text x="662" y="160" class="pin">+5V</text>
  <text x="658" y="200" class="pin">GND</text>
  <path class="neutral" d="M460 212 H520"/>
  <text x="400" y="216" class="net" fill="#1d3557">N ▶</text>

  <!-- DC rails -->
  <path class="v5" d="M700 155 H726 V88 H1240"/>
  <path class="gnd" d="M700 196 H744 V104 H1280"/>
  <text x="750" y="82" class="pin" fill="#e07b00">+5 V rail</text>
  <text x="880" y="120" class="pin" fill="#666"> </text>
  <text x="750" y="120" class="pin" fill="#666">GND rail</text>

  <!-- ESP32 -->
  <rect x="860" y="135" width="240" height="235" class="box" rx="6"/>
  <text x="885" y="168" class="lbl">ESP32 DevKit V1</text>
  <text x="885" y="188" class="pin">(ESPHome)</text>
  <!-- top pins -->
  <text x="893" y="150" class="pin" transform="rotate(0)"> </text>
  <path class="v5" d="M900 88 V135"/>
  <circle cx="900" cy="88" r="4" class="dot" fill="#e07b00"/>
  <text x="906" y="132" class="pin">VIN</text>
  <path class="gnd" d="M960 104 V135"/>
  <circle cx="960" cy="104" r="4" class="dot" fill="#666"/>
  <text x="966" y="132" class="pin">GND</text>
  <!-- right pins -->
  <text x="1010" y="254" class="pin">GPIO17 · TX2</text>
  <text x="1010" y="289" class="pin">GPIO16 · RX2</text>
  <!-- bottom pins -->
  <text x="955" y="358" class="pin">G26</text>
  <text x="1042" y="358" class="pin">G27</text>

  <!-- LD2410C -->
  <rect x="1180" y="135" width="240" height="200" class="box" rx="6"/>
  <text x="1205" y="168" class="lbl">HLK-LD2410C</text>
  <text x="1205" y="188" class="pin">24 GHz radar</text>
  <path class="v5" d="M1240 88 V135"/>
  <text x="1246" y="132" class="pin">5V</text>
  <path class="gnd" d="M1280 104 V135"/>
  <circle cx="1280" cy="104" r="4" class="dot" fill="#666"/>
  <text x="1286" y="132" class="pin">GND</text>
  <text x="1188" y="254" class="pin">RX</text>
  <text x="1188" y="289" class="pin">TX</text>
  <path class="sig" d="M1100 250 H1180"/>
  <path class="sig" d="M1100 285 H1180"/>
  <text x="1102" y="236" class="pin" fill="#2a9d2a">UART 256000</text>
  <text x="1205" y="315" class="note">mount: entrance-wall top corner,</text>
  <text x="1205" y="330" class="note">above gate, ~30° tilt down</text>

  <!-- Relay board -->
  <rect x="860" y="470" width="340" height="215" class="box" rx="6"/>
  <text x="905" y="500" class="lbl">2-ch Relay Board · opto · 10 A / 250 VAC</text>
  <text x="905" y="520" class="note">inputs usually ACTIVE-LOW — set in ESPHome</text>
  <!-- logic pins left -->
  <text x="868" y="559" class="pin">VCC</text>
  <text x="868" y="594" class="pin">GND</text>
  <path class="v5" d="M800 88 V555 H860"/>
  <circle cx="800" cy="88" r="4" class="dot" fill="#e07b00"/>
  <path class="gnd" d="M830 104 V590 H860"/>
  <circle cx="830" cy="104" r="4" class="dot" fill="#666"/>
  <!-- IN pins top -->
  <path class="sig" d="M970 370 V470"/>
  <path class="sig" d="M1055 370 V470"/>
  <text x="940" y="463" class="pin">IN1</text>
  <text x="1062" y="463" class="pin">IN2</text>
  <!-- contacts right -->
  <text x="1108" y="559" class="pin">RLY1 NO</text>
  <text x="1108" y="634" class="pin">RLY2 NO</text>
  <path class="mains" d="M1200 555 H1260"/>
  <path class="mains" d="M1200 630 H1260"/>
  <!-- COM bottom -->
  <text x="905" y="676" class="pin">RLY1 COM</text>
  <text x="1055" y="676" class="pin">RLY2 COM</text>
  <path class="mains" d="M940 685 V725"/>
  <path class="mains" d="M1090 685 V725"/>
  <text x="915" y="745" class="net" fill="#d62828">L-SW1</text>
  <text x="1065" y="745" class="net" fill="#d62828">L-SW2</text>

  <!-- Bulb groups -->
  <rect x="1260" y="520" width="190" height="70" class="box" rx="6"/>
  <text x="1275" y="546" class="lbl">Bulb Group 1</text>
  <text x="1275" y="565" class="pin">4 × WARM (corners)</text>
  <rect x="1260" y="600" width="190" height="70" class="box" rx="6"/>
  <text x="1275" y="626" class="lbl">Bulb Group 2</text>
  <text x="1275" y="645" class="pin">2 × COOL (center)</text>
  <path class="neutral" d="M1355 590 V600"/>
  <path class="neutral" d="M1355 670 V690"/>
  <text x="1364" y="694" class="net" fill="#1d3557">N</text>
  <text x="1260" y="712" class="note">bulb neutrals untouched — direct to N</text>

  <!-- ============ NODE 2 ============ -->
  <text x="30" y="810" class="sub">NODE 2 — DESK (ESP32-C3 + MOSFET inline in the strip's USB cable)</text>

  <rect x="40" y="835" width="160" height="75" class="box" rx="6"/>
  <text x="55" y="862" class="lbl">USB adapter</text>
  <text x="55" y="882" class="pin">5 V (existing)</text>

  <!-- 5V straight through -->
  <path class="v5" d="M200 860 H1000"/>
  <text x="440" y="852" class="pin" fill="#e07b00">5 V straight through to strip</text>
  <!-- USB GND -->
  <path class="gnd" d="M200 892 H255 V1095 H740"/>

  <!-- C3 -->
  <rect x="300" y="945" width="230" height="115" class="box" rx="6"/>
  <text x="320" y="975" class="lbl">ESP32-C3 Super Mini</text>
  <text x="320" y="995" class="pin">(ESPHome)</text>
  <path class="v5" d="M350 860 V945"/>
  <circle cx="350" cy="860" r="4" class="dot" fill="#e07b00"/>
  <text x="356" y="940" class="pin">5V</text>
  <path class="gnd" d="M400 1060 V1095"/>
  <circle cx="400" cy="1095" r="4" class="dot" fill="#666"/>
  <text x="380" y="1052" class="pin">GND</text>
  <text x="448" y="1032" class="pin">GPIO4</text>

  <!-- MOSFET -->
  <rect x="660" y="960" width="210" height="100" class="box" rx="6"/>
  <text x="680" y="988" class="lbl">AO3400 (N-ch)</text>
  <text x="668" y="1032" class="pin">G</text>
  <text x="845" y="1012" class="pin">D</text>
  <text x="732" y="1052" class="pin">S</text>
  <path class="sig" d="M530 1028 H660"/>
  <text x="560" y="1020" class="pin" fill="#2a9d2a">100 Ω series</text>
  <path class="gnd" d="M740 1060 V1095"/>
  <circle cx="740" cy="1095" r="4" class="dot" fill="#666"/>
  <text x="640" y="1088" class="note">+100 kΩ gate→GND pulldown</text>

  <!-- Strip -->
  <rect x="1000" y="835" width="200" height="80" class="box" rx="6"/>
  <text x="1018" y="862" class="lbl">LED Strip</text>
  <text x="1018" y="882" class="pin">BT controller kept</text>
  <path class="gnd" d="M870 1008 H950 V892 H1000"/>
  <text x="900" y="1000" class="pin" fill="#666">strip GND — switched (low-side)</text>
  <text x="1004" y="908" class="pin">GND</text>

  <!-- ============ LEGEND ============ -->
  <path d="M30 1140 H1450" stroke="#999" stroke-width="1"/>
  <text x="30" y="1170" class="sub">LEGEND</text>
  <line x1="120" y1="1166" x2="165" y2="1166" class="mains"/><text x="172" y="1170" class="pin">230 VAC Live — DANGER</text>
  <line x1="370" y1="1166" x2="415" y2="1166" class="neutral"/><text x="422" y="1170" class="pin">230 VAC Neutral</text>
  <line x1="565" y1="1166" x2="610" y2="1166" class="v5"/><text x="617" y="1170" class="pin">+5 V DC</text>
  <line x1="700" y1="1166" x2="745" y2="1166" class="gnd"/><text x="752" y="1170" class="pin">DC GND</text>
  <line x1="840" y1="1166" x2="885" y2="1166" class="sig"/><text x="892" y="1170" class="pin">3.3 V logic signal</text>
  <circle cx="1035" cy="1166" r="4" class="dot"/><text x="1045" y="1170" class="pin">junction (connected) — crossings without a dot are NOT connected</text>
  <text x="30" y="1200" class="pin"><tspan font-weight="bold">Net labels:</tspan> L-SW1 / L-SW2 = switched-live from Wall Switch 1 / 2 · N = neutral at light point. Same name = same wire, drawn apart for clarity.</text>
  <text x="30" y="1224" class="pin"><tspan font-weight="bold">Terms:</tspan> COM = relay common · NO = normally open (relay off → contact open → lights off, fail-safe) · TX2/RX2 = ESP32 hardware UART2 (TX→RX crossed) · G/D/S = MOSFET gate/drain/source.</text>
  <text x="30" y="1252" class="pin" fill="#b00000" font-weight="bold">SAFETY: flip both wall switches AND the room MCB OFF before touching any Node 1 wiring. Verify dead with a tester. Boxes not to scale.</text>
</svg>
