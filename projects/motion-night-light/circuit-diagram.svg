<svg viewBox="0 0 840 660" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">
  <!-- Motion night light — one unit. Vector master for the app; matches project.html §4. -->
  <rect x="0" y="0" width="840" height="660" fill="#14171f"/>
  <text x="40" y="30" fill="#e8eaf0" font-size="16" font-weight="bold">Motion Night Light — per-unit circuit</text>

  <!-- rails -->
  <line x1="40" y1="60" x2="800" y2="60" stroke="#ffb454" stroke-width="2"/>
  <text x="44" y="50" fill="#ffb454">VBAT (3.0–4.2 V)</text>
  <line x1="40" y1="440" x2="800" y2="440" stroke="#9aa3b2" stroke-width="2"/>
  <text x="44" y="432" fill="#9aa3b2">GND</text>

  <!-- battery + tp4056 -->
  <rect x="55" y="150" width="130" height="90" rx="8" fill="#1f232d" stroke="#6cb2ff"/>
  <text x="70" y="175" fill="#6cb2ff">TP4056</text>
  <text x="70" y="193" fill="#e8eaf0">USB-C in</text>
  <text x="70" y="211" fill="#9aa3b2">B+/B− → 18650</text>
  <text x="70" y="229" fill="#9aa3b2">OUT+/OUT−</text>
  <line x1="120" y1="150" x2="120" y2="100" stroke="#e8eaf0" stroke-width="2"/>
  <!-- switch -->
  <line x1="120" y1="100" x2="150" y2="78" stroke="#e8eaf0" stroke-width="2"/>
  <circle cx="120" cy="100" r="3" fill="#e8eaf0"/>
  <circle cx="120" cy="72" r="3" fill="#e8eaf0"/>
  <line x1="120" y1="72" x2="120" y2="60" stroke="#e8eaf0" stroke-width="2"/>
  <text x="140" y="105" fill="#9aa3b2">slide switch</text>
  <line x1="120" y1="240" x2="120" y2="440" stroke="#e8eaf0" stroke-width="2"/>

  <!-- PIR -->
  <rect x="260" y="120" width="120" height="80" rx="8" fill="#1f232d" stroke="#7ad48a"/>
  <text x="278" y="148" fill="#7ad48a">AM312</text>
  <text x="278" y="168" fill="#9aa3b2">mini PIR</text>
  <line x1="320" y1="120" x2="320" y2="60" stroke="#e8eaf0" stroke-width="2"/>
  <text x="326" y="90" fill="#9aa3b2">VCC</text>
  <line x1="320" y1="200" x2="320" y2="440" stroke="#e8eaf0" stroke-width="2"/>
  <!-- PIR out -->
  <line x1="380" y1="160" x2="450" y2="160" stroke="#e8eaf0" stroke-width="2"/>
  <text x="388" y="152" fill="#9aa3b2">OUT</text>
  <rect x="450" y="150" width="52" height="20" fill="none" stroke="#e8eaf0"/>
  <text x="456" y="165" fill="#e8eaf0">1 kΩ</text>
  <line x1="502" y1="160" x2="560" y2="160" stroke="#e8eaf0" stroke-width="2"/>
  <circle cx="560" cy="160" r="3" fill="#e8eaf0"/>

  <!-- gate node -->
  <text x="540" y="140" fill="#ffb454">gate node</text>
  <!-- pulldown -->
  <line x1="560" y1="160" x2="560" y2="300" stroke="#e8eaf0" stroke-width="2"/>
  <rect x="550" y="300" width="20" height="52" fill="none" stroke="#e8eaf0"/>
  <text x="576" y="330" fill="#e8eaf0">100 kΩ</text>
  <line x1="560" y1="352" x2="560" y2="440" stroke="#e8eaf0" stroke-width="2"/>

  <!-- mosfet -->
  <line x1="560" y1="160" x2="640" y2="160" stroke="#e8eaf0" stroke-width="2"/>
  <circle cx="655" cy="160" r="22" fill="none" stroke="#6cb2ff" stroke-width="2"/>
  <line x1="640" y1="160" x2="648" y2="160" stroke="#e8eaf0" stroke-width="2"/>
  <line x1="648" y1="148" x2="648" y2="172" stroke="#6cb2ff" stroke-width="2"/>
  <line x1="655" y1="148" x2="655" y2="172" stroke="#e8eaf0" stroke-width="2"/>
  <line x1="655" y1="148" x2="672" y2="138" stroke="#e8eaf0" stroke-width="2"/>
  <line x1="655" y1="172" x2="672" y2="182" stroke="#e8eaf0" stroke-width="2"/>
  <text x="686" y="130" fill="#6cb2ff">AO3400</text>
  <text x="686" y="146" fill="#9aa3b2">G–D–S (2N7000 ok)</text>
  <!-- drain up to LEDs -->
  <line x1="672" y1="138" x2="672" y2="122" stroke="#e8eaf0" stroke-width="2"/>
  <!-- LEDs: 3 parallel branches -->
  <line x1="620" y1="122" x2="724" y2="122" stroke="#e8eaf0" stroke-width="2"/>
  <g stroke="#e8eaf0" stroke-width="2">
    <line x1="620" y1="122" x2="620" y2="60"/><line x1="724" y1="122" x2="724" y2="60"/>
  </g>
  <!-- each branch: resistor + LED symbol -->
  <g>
    <rect x="612" y="70" width="16" height="20" fill="none" stroke="#e8eaf0"/>
    <polygon points="612,100 628,100 620,112" fill="none" stroke="#ffb454" stroke-width="2"/>
    <rect x="716" y="70" width="16" height="20" fill="none" stroke="#e8eaf0"/>
    <polygon points="716,100 732,100 724,112" fill="none" stroke="#ffb454" stroke-width="2"/>
    <line x1="672" y1="122" x2="672" y2="112" stroke="#e8eaf0" stroke-width="2"/>
    <rect x="664" y="70" width="16" height="20" fill="none" stroke="#e8eaf0"/>
    <polygon points="664,100 680,100 672,112" fill="none" stroke="#ffb454" stroke-width="2"/>
    <line x1="620" y1="60" x2="620" y2="70" stroke="#e8eaf0" stroke-width="2"/>
    <line x1="672" y1="60" x2="672" y2="70" stroke="#e8eaf0" stroke-width="2"/>
    <line x1="724" y1="60" x2="724" y2="70" stroke="#e8eaf0" stroke-width="2"/>
  </g>
  <text x="740" y="90" fill="#9aa3b2">3 × 47 Ω +</text>
  <text x="740" y="106" fill="#ffb454">warm LED</text>
  <!-- source to gnd -->
  <line x1="672" y1="182" x2="672" y2="440" stroke="#e8eaf0" stroke-width="2"/>

  <!-- daylight clamp -->
  <circle cx="470" cy="290" r="22" fill="none" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="448" y1="290" x2="456" y2="290" stroke="#e8eaf0" stroke-width="2"/>
  <line x1="462" y1="278" x2="462" y2="302" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="462" y1="284" x2="480" y2="272" stroke="#e8eaf0" stroke-width="2"/>
  <line x1="462" y1="296" x2="480" y2="308" stroke="#e8eaf0" stroke-width="2"/>
  <text x="440" y="345" fill="#ff6b6b">BC547 daylight clamp</text>
  <!-- collector to gate node -->
  <line x1="480" y1="272" x2="480" y2="230" stroke="#e8eaf0" stroke-width="2"/>
  <line x1="480" y1="230" x2="560" y2="230" stroke="#e8eaf0" stroke-width="2"/>
  <circle cx="560" cy="230" r="3" fill="#e8eaf0"/>
  <!-- emitter to gnd -->
  <line x1="480" y1="308" x2="480" y2="440" stroke="#e8eaf0" stroke-width="2"/>
  <!-- base network -->
  <line x1="448" y1="290" x2="400" y2="290" stroke="#e8eaf0" stroke-width="2"/>
  <circle cx="400" cy="290" r="3" fill="#e8eaf0"/>
  <!-- LDR + preset from VBAT -->
  <line x1="400" y1="290" x2="400" y2="248" stroke="#e8eaf0" stroke-width="2"/>
  <rect x="390" y="196" width="20" height="52" fill="none" stroke="#e8eaf0"/>
  <text x="352" y="215" fill="#9aa3b2">100 kΩ</text>
  <text x="352" y="230" fill="#9aa3b2">preset</text>
  <line x1="400" y1="196" x2="400" y2="150" stroke="#e8eaf0" stroke-width="2"/>
  <rect x="390" y="98" width="20" height="52" fill="none" stroke="#7ad48a"/>
  <text x="416" y="128" fill="#7ad48a">LDR</text>
  <line x1="400" y1="98" x2="400" y2="60" stroke="#e8eaf0" stroke-width="2"/>
  <!-- base pulldown -->
  <line x1="400" y1="290" x2="400" y2="330" stroke="#e8eaf0" stroke-width="2"/>
  <rect x="390" y="330" width="20" height="52" fill="none" stroke="#e8eaf0"/>
  <text x="352" y="360" fill="#9aa3b2">47 kΩ</text>
  <line x1="400" y1="382" x2="400" y2="440" stroke="#e8eaf0" stroke-width="2"/>

  <!-- ===== LEGEND ===== -->
  <line x1="40" y1="470" x2="800" y2="470" stroke="#2a2f3a" stroke-width="1"/>
  <text x="40" y="494" fill="#e8eaf0" font-weight="bold">LEGEND</text>
  <line x1="40" y1="512" x2="80" y2="512" stroke="#ffb454" stroke-width="2"/>
  <text x="90" y="516" fill="#9aa3b2">VBAT rail (18650 via TP4056 OUT+)</text>
  <line x1="40" y1="534" x2="80" y2="534" stroke="#9aa3b2" stroke-width="2"/>
  <text x="90" y="538" fill="#9aa3b2">GND rail (TP4056 OUT−)</text>
  <line x1="40" y1="556" x2="80" y2="556" stroke="#e8eaf0" stroke-width="2"/>
  <circle cx="60" cy="556" r="3" fill="#e8eaf0"/>
  <text x="90" y="560" fill="#9aa3b2">signal wire · dot = connected junction</text>
  <rect x="46" y="572" width="28" height="12" fill="none" stroke="#e8eaf0"/>
  <text x="90" y="582" fill="#9aa3b2">resistor (value beside symbol)</text>
  <polygon points="48,596 64,596 56,608" fill="none" stroke="#ffb454" stroke-width="2"/>
  <text x="90" y="604" fill="#9aa3b2">LED (warm white, own 47 Ω each)</text>
  <text x="450" y="516" fill="#7ad48a">green = sensing (PIR, LDR)</text>
  <text x="450" y="538" fill="#6cb2ff">blue = switching (TP4056, AO3400)</text>
  <text x="450" y="560" fill="#ff6b6b">red = BC547 daylight clamp</text>
  <text x="450" y="582" fill="#9aa3b2">Bright: LEDs held off ·</text>
  <text x="450" y="600" fill="#9aa3b2">Dark: PIR OUT drives gate</text>
</svg>
